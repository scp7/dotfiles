# Alias/function descriptions and section overrides for man page generation.
# Format: name|section|description
# If a description is found here, it overrides any comment in .zshrc.
# If a section is given, it overrides the auto-detected section.

# General
wanip|General|show public IP address
duf|General|disk usage with human-readable sizes
x|General|exit the shell

# Git
g|Git|git shorthand
gs|Git|git status
gd|Git|git diff
g-|Git|switch to previous branch
gpm|Git|pull latest from origin/main
gl|Git|compact git log

# Editors
vi|Editors|open neovim
vim|Editors|open neovim

# Language and Tools
python|Tools|use python3
nvm|Tools|use fnm (fast node manager)
cve|Tools|clear active python virtualenv
killpy|Tools|kill process on port 8000
chrome|Tools|open Google Chrome
ff|Tools|find files (fd wrapper, hidden included)

# File Viewers
cat|File Viewers|pretty-print with bat
ls|File Viewers|list files with eza
l|File Viewers|list files with eza (short)
ll|File Viewers|long list with git status
lt|File Viewers|tree view (2 levels deep)

# Worktrees (wt)
wl|Worktrees|list worktrees
wc|Worktrees|commit current worktree step
wtm|Worktrees|switch to main worktree
wtt|Worktrees|create and switch to new worktree
wd|Worktrees|remove a worktree

# Cargo / Nono
nn|Cargo|run cargo project (cargo run --)
sclaude|Nono Sandbox|launch claude in nono sandbox

# Functions
sign-file|Functions|sign a file with minisign (key from macOS Keychain)
sudo|Functions|sudo with Touch ID support
claude|Functions|run claude in nono sandbox (default)
codex|Functions|run codex in nono sandbox
